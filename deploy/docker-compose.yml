version: '3'
services:
  Kafka:
    image: apache/kafka:3.9.0
    container_name: Kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://127.0.0.1:9093,INTERNAL://Kafka:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://Kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/logs
    volumes:
      - ./kafka:/var/lib/kafka
    networks:
      - AIGO-Net
    user: root

  Kafka-UI:
    container_name: Kafka-UI
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - Kafka
    environment:
      DYNAMIC_CONFIG_ENABLED: "TRUE"
    networks:
      - AIGO-Net

  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: etcd
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - ./etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - AIGO-Net

  etcd-UI:
    image: evildecay/etcdkeeper:latest
    container_name: etcd-UI
    restart: always
    ports:
      - "8081:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      ETCD_SERVERS: "http://etcd:2379"
    depends_on:
      - etcd
    networks:
      - AIGO-Net

  MinIO:
    container_name: MinIO
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - AIGO-Net

  Milvus:
    container_name: Milvus
    image: milvusdb/milvus:v2.6.8
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: MinIO:9000
      MQ_TYPE: woodpecker
    volumes:
      - ./milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "MinIO"
    networks:
      - AIGO-Net

  Attu:
    container_name: Attu
    image: zilliz/attu:v2.6
    environment:
      MILVUS_URL: Milvus:19530 
    depends_on:
      - "Milvus"
    ports: 
      - "8002:3000"
    volumes:
      - ./attu:/var/lib/milvus
    networks:
      - AIGO-Net

  # 1. Prometheus - 指标采集
  Prometheus:
    image: prom/prometheus:latest
    container_name: Prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - AIGO-Net
  
  # 2. Jaeger - 分布式链路追踪
  Jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: Jaeger
    restart: always
    environment:
      - COLLECTOR_OTLP_ENABLED=true # 开启 OpenTelemetry 支持
    ports:
      - "16686:16686" # Jaeger Web UI (浏览器访问)
      - "14268:14268" # 直接接收 HTTP spans (旧版客户端用)
      - "4317:4317"   # OTLP gRPC 接收端口 (推荐 Go OpenTelemetry SDK 使用)
      - "4318:4318"   # OTLP HTTP 接收端口
    networks:
      - AIGO-Net

  # 3. Grafana - 监控可视化
  Grafana:
    image: grafana/grafana-enterprise:latest
    container_name: Grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes: 
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin # 设置默认密码，方便登录
    networks:
      - AIGO-Net

volumes:
  prometheus-data: {}
  grafana-data: {}

networks:
  AIGO-Net:
    driver: bridge
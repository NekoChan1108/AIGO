<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱验证</title>
  <style>
/* 邮件客户端兼容性优化 */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
  background-color: #f5f7fa;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
  color: #222222;
  line-height:1.65;
  padding:24px 0;
}

.container{
  width: 92%;
  max-width: 640px;
  margin: 0 auto;
  background:#ffffff;
  border-radius: 16px;
  box-shadow: 0 12px 34px rgba(0,0,0,.12);
  overflow:hidden;
  border:1px solid #eaeef5;
}

.header{
  background-color: #667eea;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color:#ffffff;
  text-align:center;
  padding:46px 28px;
}
.header h1{
  font-size: 28px;
  font-weight:800;
  letter-spacing:.6px;
  margin: 0;
}
.header p{
  margin: 10px 0 0;
  font-size: 16px;
  opacity:.92;
}

.content{
  padding:40px 20px;
  text-align:center;
}

.lead{
  font-size: 18px;
  color:#333333;
  margin-bottom: 16px;
}
.text{
  font-size: 15px;
  color: #666666;
  margin: 10px 0;
}

/* 验证码样式优化：鲜艳红色，确保不被糊住 */
.code-container {
  margin: 30px 0;
  text-align: center;
}
.code{
  display:inline-block;
  background-color: #fff5f5; /* 极浅红色背景 */
  color: #e53e3e !important; /* 鲜艳的深红色文字 */
  font-weight: 900;
  font-family: 'Courier New', Courier, monospace;
  font-size: 42px; /* 更大的字号 */
  letter-spacing: 8px;
  padding: 15px 30px;
  border-radius: 12px;
  border: 2px dashed #feb2b2; /* 红色虚线边框增强存在感 */
  text-transform: uppercase;
  box-shadow: 0 4px 12px rgba(229, 62, 62, 0.08);
}

.expire{
  color:#e53e3e;
  font-weight:800;
}
.note{
  background:#fffaf0;
  border-left:4px solid #f6ad55;
  padding:12px 18px;
  border-radius: 0 10px 10px 0;
  margin: 20px auto;
  color:#c05621;
  font-size: 14px;
  text-align:center;
}

.footer{
  background-color: #f8f9fa;
  padding: 26px 30px;
  text-align:center;
  color:#777777;
  font-size:14px;
  border-top:1px solid #eeeeee;
}
.brand{
  font-weight:800;
  color:#667eea;
  letter-spacing:.6px;
  font-size:18px;
  margin-bottom:6px;
}
.small{
  margin-top:8px;
  font-size:12px;
  color:#8a8a8a;
}

@media (max-width: 520px){
  .header h1{ font-size: 24px; }
  .code { font-size: 32px !important; letter-spacing: 4px !important; padding: 10px 20px !important; }
}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>邮箱验证</h1>
      <p>安全验证，保护账户</p>
    </div>

    <div class="content">
      <p class="lead">亲爱的用户，您好！</p>
      <p class="text">感谢您使用我们的服务。</p>
      <p class="text">您的验证码为：</p>

      <div class="code-container">
        <div class="code">{{.Code}}</div>
      </div>

      <p class="text">此验证码将在 <span class="expire">{{.ExpireTime}}分钟</span> 后失效，请尽快使用。</p>

      <div class="note">如果不是您本人操作，请忽略此邮件并及时检查账户安全。</div>

      <p class="text">请勿向任何人透露您的验证码，以保障账户安全。</p>
    </div>

    <div class="footer">
      <div class="brand">AIGO</div>
      <p>&copy; {{.CurrentYear}} AIGO. 保留所有权利。</p>
      <p class="small">这是一封系统邮件，请勿直接回复</p>
    </div>
  </div>
</body>
</html>

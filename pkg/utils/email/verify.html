<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱验证</title>
  <style>

:root{
  --primary-1:#667eea;
  --primary-2:#764ba2;
  --bg-1:#f5f7fa;
  --bg-2:#e4edf5;
  --text:#222;
  --muted:#666;
  --border:#eaeef5;
  --radius:16px;
  --maxw:640px;
  --shadow:0 12px 34px rgba(0,0,0,.12), 0 4px 10px rgba(0,0,0,.06);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
  background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
  color:var(--text);
  line-height:1.65;
  padding:24px 0;
}

.container{
  width: min(92vw, var(--maxw));
  margin: 0 auto;
  background:#fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow:hidden;
  border:1px solid var(--border);
}

.header{
  background: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 100%);
  color:#fff;
  text-align:center;
  padding:46px 28px;
  position:relative;
}
.header::after{
  content:"";
  position:absolute;
  inset:auto 0 -12px 0;
  height:24px;
  background: linear-gradient(to bottom, rgba(255,255,255,.25) 0%, transparent 100%);
  opacity:.35;
}
.header h1{
  font-size: clamp(26px, 5vw, 36px);
  font-weight:800;
  letter-spacing:.6px;
}
.header p{
  margin-top:10px;
  font-size: clamp(14px, 2.5vw, 16px);
  opacity:.92;
}

.content{
  padding:46px 36px;
  text-align:center;
}

.lead{
  font-size: 17px;
  color:#444;
  margin-bottom: 16px;
}
.text{
  font-size: 15.5px;
  color: var(--muted);
  margin: 10px 0;
}

.footer{
  background: linear-gradient(to top, #f8f9fa 0%, #ffffff 100%);
  padding: 26px 30px;
  text-align:center;
  color:#777;
  font-size:14px;
  border-top:1px solid #eee;
}
.brand{
  font-weight:800;
  color:var(--primary-1);
  letter-spacing:.6px;
  font-size:18px;
  margin-bottom:6px;
}
.small{
  margin-top:8px;
  font-size:12px;
  color:#8a8a8a;
}

a{color:var(--primary-1);text-decoration:none;}
a:hover{text-decoration:underline;}

/* Responsive */
@media (max-width: 520px){
  body{padding:10px 0;}
  .container{width:100%;margin:0;border-radius:0;}
  .header{padding:34px 18px;}
  .content{padding:30px 16px;}
  .footer{padding:22px 16px;}
}


.code{
  display:inline-block;
  background: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 100%);
  color:#fff;
  font-weight:900;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
  font-size: clamp(24px, 6vw, 36px);
  letter-spacing: clamp(3px, 1.4vw, 6px);
  padding: 18px 26px;
  border-radius: 14px;
  margin: 22px 0 18px;
  box-shadow: 0 10px 26px rgba(102,126,234,.35), 0 5px 12px rgba(102,126,234,.22);
  text-transform: uppercase;
  max-width: 100%;
}
.expire{
  color:#e74c3c;
  font-weight:800;
}
.note{
  background:#fef9e7;
  border-left:4px solid #f39c12;
  padding:12px 18px;
  border-radius: 0 10px 10px 0;
  margin: 18px auto;
  color:#d35400;
  font-size: 13.5px;
  text-align:center;
}

  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>邮箱验证</h1>
      <p>安全验证，保护账户</p>
    </div>

    <div class="content">
      <p class="lead">亲爱的用户，您好！</p>
      <p class="text">感谢您使用我们的服务。</p>
      <p class="text">您的验证码为：</p>

      <div class="code">{{.Code}}</div>

      <p class="text">此验证码将在 <span class="expire">{{.ExpireTime}}分钟</span> 后失效，请尽快使用。</p>

      <div class="note" >如果不是您本人操作，请忽略此邮件并及时检查账户安全。</div>

      <p class="text">请勿向任何人透露您的验证码，以保障账户安全。</p>
    </div>

    <div class="footer">
      <div class="brand">AIGO</div>
      <p>&copy; {{.CurrentYear}} AIGO. 保留所有权利。</p>
      <p class="small">这是一封系统邮件，请勿直接回复</p>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎加入我们</title>
  <style>
/* 邮件客户端兼容性优化 */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
  background-color: #f5f7fa;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
  color: #222222;
  line-height:1.65;
  padding:24px 0;
}

.container{
  width: 92%;
  max-width: 640px;
  margin: 0 auto;
  background:#ffffff;
  border-radius: 16px;
  box-shadow: 0 12px 34px rgba(0,0,0,.12);
  overflow:hidden;
  border:1px solid #eaeef5;
}

.header{
  background-color: #667eea;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color:#ffffff;
  text-align:center;
  padding:46px 28px;
}
.header h1{
  font-size: 28px;
  font-weight:800;
  letter-spacing:.6px;
  margin:0;
}
.header p{
  margin:10px 0 0;
  font-size: 16px;
  opacity:.92;
}

.content{
  padding:40px 20px;
  text-align:center;
}

.lead{
  font-size: 18px;
  color:#333333;
  margin-bottom: 16px;
}
.text{
  font-size: 15px;
  color: #666666;
  margin: 10px 0;
}

.name{
  color:#4c51bf; /* 加深蓝色 */
  font-weight:800;
}
.cta{
  display:inline-block;
  padding: 14px 32px;
  border-radius: 30px;
  background-color: #667eea;
  color: #ffffff !important;
  font-weight:700;
  margin-top: 20px;
  text-decoration: none;
  box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4);
}

.footer{
  background-color: #f8f9fa;
  padding: 26px 30px;
  text-align:center;
  color:#777777;
  font-size:14px;
  border-top:1px solid #eeeeee;
}
.brand{
  font-weight:800;
  color:#667eea;
  letter-spacing:.6px;
  font-size:18px;
  margin-bottom:6px;
}
.small{
  margin-top:8px;
  font-size:12px;
  color:#8a8a8a;
}

@media (max-width: 520px){
  .header h1{ font-size: 24px; }
}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>欢迎加入我们！</h1>
      <p>开启您的专属体验之旅</p>
    </div>

    <div class="content">
      <p class="lead">亲爱的 <span class="name">{{.Username}}</span>，感谢您注册我们的服务！</p>
      <p class="text">我们很高兴您成为我们社区的一员。</p>
      <p class="text">如果您有任何问题，请随时联系我们。再次欢迎您加入我们的大家庭！</p>

      <a class="cta" href="https://github.com/NekoChan1108">联系我们</a>
    </div>

    <div class="footer">
      <div class="brand">AIGO</div>
      <p>&copy; {{.CurrentYear}} AIGO. 保留所有权利。</p>
      <p class="small">这是一封系统邮件，请勿直接回复</p>
    </div>
  </div>
</body>
</html>

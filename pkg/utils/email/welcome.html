<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎加入我们</title>
  <style>

:root{
  --primary-1:#667eea;
  --primary-2:#764ba2;
  --bg-1:#f5f7fa;
  --bg-2:#e4edf5;
  --text:#222;
  --muted:#666;
  --border:#eaeef5;
  --radius:16px;
  --maxw:640px;
  --shadow:0 12px 34px rgba(0,0,0,.12), 0 4px 10px rgba(0,0,0,.06);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
  background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
  color:var(--text);
  line-height:1.65;
  padding:24px 0;
}

.container{
  width: min(92vw, var(--maxw));
  margin: 0 auto;
  background:#fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow:hidden;
  border:1px solid var(--border);
}

.header{
  background: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 100%);
  color:#fff;
  text-align:center;
  padding:46px 28px;
  position:relative;
}
.header::after{
  content:"";
  position:absolute;
  inset:auto 0 -12px 0;
  height:24px;
  background: linear-gradient(to bottom, rgba(255,255,255,.25) 0%, transparent 100%);
  opacity:.35;
}
.header h1{
  font-size: clamp(26px, 5vw, 36px);
  font-weight:800;
  letter-spacing:.6px;
}
.header p{
  margin-top:10px;
  font-size: clamp(14px, 2.5vw, 16px);
  opacity:.92;
}

.content{
  padding:46px 36px;
  text-align:center;
}

.lead{
  font-size: 17px;
  color:#444;
  margin-bottom: 16px;
}
.text{
  font-size: 15.5px;
  color: var(--muted);
  margin: 10px 0;
}

.footer{
  background: linear-gradient(to top, #f8f9fa 0%, #ffffff 100%);
  padding: 26px 30px;
  text-align:center;
  color:#777;
  font-size:14px;
  border-top:1px solid #eee;
}
.brand{
  font-weight:800;
  color:var(--primary-1);
  letter-spacing:.6px;
  font-size:18px;
  margin-bottom:6px;
}
.small{
  margin-top:8px;
  font-size:12px;
  color:#8a8a8a;
}

a{color:var(--primary-1);text-decoration:none;}
a:hover{text-decoration:underline;}

/* Responsive */
@media (max-width: 520px){
  body{padding:10px 0;}
  .container{width:100%;margin:0;border-radius:0;}
  .header{padding:34px 18px;}
  .content{padding:30px 16px;}
  .footer{padding:22px 16px;}
}


.name{
  color:var(--primary-1);
  font-weight:800;
}
.cta{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding: 12px 18px;
  border-radius: 999px;
  background: rgba(102,126,234,.12);
  border:1px solid rgba(102,126,234,.25);
  font-weight:700;
  margin-top: 14px;
}
.cta:hover{background: rgba(102,126,234,.18);text-decoration:none;}

  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>欢迎加入我们！</h1>
      <p>开启您的专属体验之旅</p>
    </div>

    <div class="content">
      <p class="lead">亲爱的 <span class="name">{{.Username}}</span>，感谢您注册我们的服务！</p>
      <p class="text">我们很高兴您成为我们社区的一员。</p>
      <p class="text">如果您有任何问题，请随时联系我们。再次欢迎您加入我们的大家庭！</p>

      <a class="cta" href="https://github.com/NekoChan1108">联系我们</a>
    </div>

    <div class="footer">
      <div class="brand">AIGO</div>
      <p>&copy; {{.CurrentYear}} AIGO. 保留所有权利。</p>
      <p class="small">这是一封系统邮件，请勿直接回复</p>
    </div>
  </div>
</body>
</html>
